<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart with LocalStorage</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    header { background: #2c3e50; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 22px; }
    #cart-badge { background: #e74c3c; color: white; padding: 5px 12px; border-radius: 20px; font-size: 13px; }
    .container { max-width: 1000px; margin: 30px auto; padding: 0 15px; display: flex; gap: 20px; }
    .books { flex: 1; }
    .books h2 { margin-bottom: 15px; color: #2c3e50; }
    .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 15px; }
    .book { background: white; border-radius: 8px; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .book .icon { font-size: 36px; margin-bottom: 8px; }
    .book h3 { font-size: 13px; color: #2c3e50; margin-bottom: 4px; }
    .book .price { color: #e74c3c; font-weight: bold; margin: 6px 0; }
    .book button { background: #2c3e50; color: white; border: none; padding: 7px 0; border-radius: 4px; cursor: pointer; font-size: 13px; width: 100%; }
    .book button:hover { background: #27ae60; }
    .cart-panel { width: 280px; background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); height: fit-content; }
    .cart-panel h2 { color: #2c3e50; margin-bottom: 10px; font-size: 17px; }
    .note { font-size: 11px; color: #27ae60; margin-bottom: 12px; }
    #cart-list { list-style: none; }
    .ci { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
    .ci .rm { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 16px; }
    #empty { color: #aaa; font-size: 13px; text-align: center; padding: 15px 0; }
    #total-row { display: flex; justify-content: space-between; font-weight: bold; padding-top: 10px; color: #2c3e50; border-top: 2px solid #2c3e50; margin-top: 8px; }
    #clear-btn { width: 100%; margin-top: 10px; background: #e74c3c; color: white; border: none; padding: 9px; border-radius: 5px; cursor: pointer; font-size: 13px; }
    #clear-btn:hover { background: #c0392b; }
  </style>
</head>
<body>
<header>
  <h1>BookStore</h1>
  <span id="cart-badge">Cart: 0</span>
</header>
<div class="container">
  <div class="books">
    <h2>Books</h2>
    <div class="book-grid" id="bookGrid"></div>
  </div>
  <div class="cart-panel">
    <h2>My Cart</h2>
    <p class="note">&#128190; Saved with LocalStorage</p>
    <div id="empty">Cart is empty.</div>
    <ul id="cart-list"></ul>
    <div id="total-row" style="display:none"><span>Total</span><span id="total"></span></div>
    <button id="clear-btn" style="display:none" onclick="clearCart()">Clear Cart</button>
  </div>
</div>

<script>
  const BOOKS = [
    { id: 1, title: "The Alchemist", price: 299, icon: "&#128218;" },
    { id: 2, title: "Atomic Habits", price: 399, icon: "&#128214;" },
    { id: 3, title: "Sapiens", price: 499, icon: "&#128215;" },
    { id: 4, title: "Deep Work", price: 449, icon: "&#128216;" },
    { id: 5, title: "1984", price: 280, icon: "&#128217;" },
    { id: 6, title: "Rich Dad Poor Dad", price: 349, icon: "&#9733;" }
  ];

  function loadCart() {
    return JSON.parse(localStorage.getItem('bookCart') || '[]');
  }
  function saveCart(cart) {
    localStorage.setItem('bookCart', JSON.stringify(cart));
  }
  function addToCart(id) {
    const cart = loadCart();
    const book = BOOKS.find(b => b.id === id);
    cart.push({ ...book, uid: Date.now() });
    saveCart(cart);
    renderCart();
  }
  function removeItem(uid) {
    const cart = loadCart().filter(i => i.uid !== uid);
    saveCart(cart);
    renderCart();
  }
  function clearCart() {
    saveCart([]);
    renderCart();
  }

  function renderCart() {
    const cart = loadCart();
    const total = cart.reduce((s, i) => s + i.price, 0);
    document.getElementById('cart-badge').textContent = `Cart: ${cart.length}`;
    const list = document.getElementById('cart-list');

    if (cart.length === 0) {
      document.getElementById('empty').style.display = 'block';
      document.getElementById('total-row').style.display = 'none';
      document.getElementById('clear-btn').style.display = 'none';
      list.innerHTML = '';
    } else {
      document.getElementById('empty').style.display = 'none';
      document.getElementById('total-row').style.display = 'flex';
      document.getElementById('clear-btn').style.display = 'block';
      document.getElementById('total').innerHTML = `&#8377;${total}`;
      list.innerHTML = cart.map(i => `
        <li class="ci">
          <span>${i.title}</span>
          <span>&#8377;${i.price}</span>
          <button class="rm" onclick="removeItem(${i.uid})">&#10005;</button>
        </li>`).join('');
    }
  }

  document.getElementById('bookGrid').innerHTML = BOOKS.map(b => `
    <div class="book">
      <div class="icon">${b.icon}</div>
      <h3>${b.title}</h3>
      <div class="price">&#8377;${b.price}</div>
      <button onclick="addToCart(${b.id})">+ Add to Cart</button>
    </div>`).join('');

  renderCart();
</script>
</body>
</html>
