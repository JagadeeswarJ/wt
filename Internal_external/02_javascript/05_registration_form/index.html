<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Registration</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .box { background: white; padding: 35px; border-radius: 8px; width: 380px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
    input {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 5px;
      font-size: 14px; margin-bottom: 5px; outline: none;
    }
    input:focus { border-color: #3498db; }
    .err { color: #e74c3c; font-size: 12px; margin-bottom: 10px; display: block; min-height: 16px; }
    button {
      width: 100%; background: #2c3e50; color: white; padding: 12px;
      border: none; border-radius: 5px; font-size: 15px; cursor: pointer; margin-top: 5px;
    }
    button:hover { background: #3498db; }
    #success { display:none; text-align:center; color:#27ae60; font-size:15px; margin-top:15px; }
  </style>
</head>
<body>
<div class="box">
  <h2>Register</h2>
  <form id="regForm" novalidate>
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username">
    <span class="err" id="uErr"></span>

    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password">
    <span class="err" id="pErr"></span>

    <label>Confirm Password</label>
    <input type="password" id="confirm" placeholder="Confirm password">
    <span class="err" id="cErr"></span>

    <button type="submit">Register</button>
  </form>
  <p id="success">Registration successful!</p>
</div>

<script>
  document.getElementById('regForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    const c = document.getElementById('confirm').value;
    let valid = true;

    document.getElementById('uErr').textContent = '';
    document.getElementById('pErr').textContent = '';
    document.getElementById('cErr').textContent = '';

    if (u.length < 3) {
      document.getElementById('uErr').textContent = 'Username must be at least 3 characters.';
      valid = false;
    }
    if (p.length < 6) {
      document.getElementById('pErr').textContent = 'Password must be at least 6 characters.';
      valid = false;
    }
    if (p !== c) {
      document.getElementById('cErr').textContent = 'Passwords do not match.';
      valid = false;
    }

    if (valid) {
      document.getElementById('regForm').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    }
  });
</script>
</body>
</html>
