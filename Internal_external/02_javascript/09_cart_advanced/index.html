<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Advanced Shopping Cart</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
      }
      header {
        background: #2c3e50;
        color: white;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      header h1 {
        font-size: 22px;
      }
      .container {
        max-width: 1000px;
        margin: 30px auto;
        padding: 0 15px;
        display: flex;
        gap: 20px;
      }
      .books {
        flex: 1;
      }
      .books h2 {
        margin-bottom: 15px;
        color: #2c3e50;
      }
      .book-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
        gap: 15px;
      }
      .book {
        background: white;
        border-radius: 8px;
        padding: 15px;
        text-align: center;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      .book .icon {
        font-size: 36px;
        margin-bottom: 8px;
      }
      .book h3 {
        font-size: 13px;
        color: #2c3e50;
        margin-bottom: 4px;
      }
      .book .price {
        color: #e74c3c;
        font-weight: bold;
        margin: 6px 0;
        font-size: 15px;
      }
      .book button {
        background: #2c3e50;
        color: white;
        border: none;
        padding: 7px 0;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        width: 100%;
      }
      .book button:hover {
        background: #27ae60;
      }
      .cart-panel {
        width: 300px;
        background: white;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        height: fit-content;
      }
      .cart-panel h2 {
        color: #2c3e50;
        margin-bottom: 15px;
      }
      #cart-items {
        list-style: none;
      }
      .cart-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border-bottom: 1px solid #f0f0f0;
        font-size: 13px;
      }
      .cart-item span {
        flex: 1;
        color: #333;
      }
      .cart-item .item-price {
        color: #27ae60;
        font-weight: bold;
        min-width: 60px;
        text-align: right;
      }
      .cart-item .remove-btn {
        background: #e74c3c;
        color: white;
        border: none;
        padding: 3px 8px;
        border-radius: 3px;
        cursor: pointer;
        font-size: 11px;
        margin-left: 8px;
      }
      .remove-btn:hover {
        background: #c0392b;
      }
      #total-section {
        margin-top: 15px;
        padding-top: 12px;
        border-top: 2px solid #2c3e50;
      }
      #total-section p {
        display: flex;
        justify-content: space-between;
        font-size: 15px;
        font-weight: bold;
        color: #2c3e50;
      }
      #empty-msg {
        color: #aaa;
        font-size: 13px;
        text-align: center;
        padding: 20px 0;
      }
      #checkout-btn {
        width: 100%;
        margin-top: 12px;
        background: #27ae60;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 5px;
        font-size: 14px;
        cursor: pointer;
      }
      #checkout-btn:hover {
        background: #1e8449;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>BookStore - Advanced Cart</h1>
      <span style="color: #ecf0f1; font-size: 14px" id="cart-header"
        >0 items | &#8377;0</span
      >
    </header>
    <div class="container">
      <div class="books">
        <h2>Books</h2>
        <div class="book-list" id="bookList"></div>
      </div>
      <div class="cart-panel">
        <h2>Cart</h2>
        <p id="empty-msg">Cart is empty.</p>
        <ul id="cart-items"></ul>
        <div id="total-section" style="display: none">
          <p><span>Total:</span><span id="total-price"></span></p>
          <button id="checkout-btn">Checkout</button>
        </div>
      </div>
    </div>

    <script>
      const books = [
        { title: "The Alchemist", price: 299, icon: "&#128218;" },
        { title: "Atomic Habits", price: 399, icon: "&#128214;" },
        { title: "Sapiens", price: 499, icon: "&#128215;" },
        { title: "Deep Work", price: 449, icon: "&#128216;" },
        { title: "1984", price: 280, icon: "&#128217;" },
        { title: "Rich Dad Poor Dad", price: 349, icon: "&#9733;" },
      ];

      let cart = [];

      function renderBooks() {
        document.getElementById("bookList").innerHTML = books
          .map(
            (b, i) => `
      <div class="book">
        <div class="icon">${b.icon}</div>
        <h3>${b.title}</h3>
        <div class="price">&#8377;${b.price}</div>
        <button onclick="addToCart(${i})">+ Add to Cart</button>
      </div>
    `,
          )
          .join("");
      }

      function addToCart(i) {
        cart.push({ ...books[i], id: Date.now() + Math.random() });
        renderCart();
      }

      function removeFromCart(id) {
        cart = cart.filter((item) => item.id !== id);
        renderCart();
      }

      function renderCart() {
        const ul = document.getElementById("cart-items");
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        document.getElementById("cart-header").textContent =
          `${cart.length} items | &#8377;${total}`;

        if (cart.length === 0) {
          document.getElementById("empty-msg").style.display = "block";
          document.getElementById("total-section").style.display = "none";
          ul.innerHTML = "";
        } else {
          document.getElementById("empty-msg").style.display = "none";
          document.getElementById("total-section").style.display = "block";
          document.getElementById("total-price").innerHTML = `&#8377;${total}`;
          ul.innerHTML = cart
            .map(
              (item) => `
        <li class="cart-item">
          <span>${item.title}</span>
          <span class="item-price">&#8377;${item.price}</span>
          <button class="remove-btn" onclick="removeFromCart(${item.id})">Remove</button>
        </li>
      `,
            )
            .join("");
        }
      }

      document.getElementById("checkout-btn").addEventListener("click", () => {
        alert(`Order placed! Total: ₹${cart.reduce((s, i) => s + i.price, 0)}`);
        cart = [];
        renderCart();
      });

      renderBooks();
    </script>
  </body>
</html>
