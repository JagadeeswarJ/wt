<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .box { background: white; padding: 35px; border-radius: 8px; width: 380px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
    p.sub { text-align: center; color: #777; font-size: 13px; margin-bottom: 25px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; margin-bottom: 5px; outline: none; }
    input:focus { border-color: #3498db; }
    .err { color: #e74c3c; font-size: 12px; margin-bottom: 10px; display: block; min-height: 16px; }
    button { width: 100%; background: #e74c3c; color: white; padding: 12px; border: none; border-radius: 5px; font-size: 15px; cursor: pointer; }
    button:hover { background: #c0392b; }
    #success { display:none; text-align:center; color:#27ae60; font-size:14px; margin-top:15px; padding: 12px; background: #eafaf1; border-radius: 5px; }
  </style>
</head>
<body>
<div class="box">
  <h2>Forgot Password</h2>
  <p class="sub">Enter your email to receive a reset link.</p>
  <form id="fpForm" novalidate>
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@example.com">
    <span class="err" id="eErr"></span>
    <button type="submit">Send Reset Link</button>
  </form>
  <div id="success">Reset link sent to your email!</div>
</div>

<script>
  document.getElementById('fpForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const errEl = document.getElementById('eErr');
    errEl.textContent = '';

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!email) {
      errEl.textContent = 'Email is required.';
    } else if (!emailRegex.test(email)) {
      errEl.textContent = 'Please enter a valid email address.';
    } else {
      document.getElementById('fpForm').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    }
  });
</script>
</body>
</html>
