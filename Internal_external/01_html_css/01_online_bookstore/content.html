<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; background: #f9f9f9; }
  h1 { color: #2c3e50; }
  .books { display: flex; flex-wrap: wrap; gap: 20px; }
  .book { background: white; border: 1px solid #ddd; padding: 15px; width: 180px; border-radius: 5px; }
  .book h3 { margin: 0 0 8px; font-size: 16px; color: #2c3e50; }
  .book p { margin: 4px 0; font-size: 13px; color: #555; }
  .book .price { color: #e74c3c; font-weight: bold; }
</style>
</head>
<body>
  <h1>Welcome to BookStore</h1>
  <p>Browse our collection of books below.</p>
  <div class="books">
    <div class="book">
      <h3>The Alchemist</h3>
      <p>Paulo Coelho</p>
      <p class="price">&#8377;299</p>
    </div>
    <div class="book">
      <h3>Atomic Habits</h3>
      <p>James Clear</p>
      <p class="price">&#8377;399</p>
    </div>
    <div class="book">
      <h3>Rich Dad Poor Dad</h3>
      <p>Robert Kiyosaki</p>
      <p class="price">&#8377;349</p>
    </div>
    <div class="book">
      <h3>Deep Work</h3>
      <p>Cal Newport</p>
      <p class="price">&#8377;449</p>
    </div>
  </div>
</body>
</html>
