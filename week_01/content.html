<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PageTurn Books</title>
    <link rel="stylesheet" href="content.css">
</head>
<body>

    <section class="categories">
        <h2>Book Categories</h2>
        <ul>
            <li>Fiction</li>
            <li>Non-Fiction</li>
            <li>Science</li>
            <li>Technology</li>
            <li>Children</li>
        </ul>
    </section>

    <section class="books">
        <h2>Available Books</h2>
        <table>
            <tr>
                <th>Book Name</th>
                <th>Author</th>
                <th>Price</th>
                <th>Buy</th>
            </tr>
            <tr>
                <td>1984</td>
                <td>George Orwell</td>
                <td>$10</td>
                <td><button>Buy</button></td>
            </tr>
            <tr>
                <td>Thinking, Fast and Slow</td>
                <td>Daniel Kahneman</td>
                <td>$18</td>
                <td><button>Buy</button></td>
            </tr>
            <tr>
                <td>The Pragmatic Programmer</td>
                <td>David Thomas</td>
                <td>$28</td>
                <td><button>Buy</button></td>
            </tr>
        </table>
    </section>

    <section class="order">
        <h2>Order a Book</h2>
        <form>
            <label>Full Name</label>
            <input type="text" required>

            <label>Email</label>
            <input type="email" required>

            <label>Select Book</label>
            <select>
                <option>1984</option>
                <option>Thinking, Fast and Slow</option>
                <option>The Pragmatic Programmer</option>
            </select>

            <label>Quantity</label>
            <input type="number" min="1" value="1">

            <button type="submit">Place Order</button>
        </form>
    </section>

</body>
</html>
