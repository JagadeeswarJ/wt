<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Folio</title>
    <link rel="stylesheet" href="content.css">
</head>
<body>

    <section class="categories">
        <h2>Sections</h2>
        <ul>
            <li>Literary Fiction</li>
            <li>Biographies</li>
            <li>Science &amp; Nature</li>
            <li>Technology</li>
            <li>Young Adult</li>
        </ul>
    </section>

    <section class="books">
        <h2>Featured Books</h2>
        <table>
            <tr>
                <th>Book Name</th>
                <th>Author</th>
                <th>Price</th>
                <th>Buy</th>
            </tr>
            <tr>
                <td>Dune</td>
                <td>Frank Herbert</td>
                <td>$14</td>
                <td><button>Buy</button></td>
            </tr>
            <tr>
                <td>Educated</td>
                <td>Tara Westover</td>
                <td>$16</td>
                <td><button>Buy</button></td>
            </tr>
            <tr>
                <td>The Art of War</td>
                <td>Sun Tzu</td>
                <td>$8</td>
                <td><button>Buy</button></td>
            </tr>
        </table>
    </section>

    <section class="order">
        <h2>Place an Order</h2>
        <form>
            <label>Full Name</label>
            <input type="text" required>

            <label>Email</label>
            <input type="email" required>

            <label>Select Book</label>
            <select>
                <option>Dune</option>
                <option>Educated</option>
                <option>The Art of War</option>
            </select>

            <label>Quantity</label>
            <input type="number" min="1" value="1">

            <button type="submit">Place Order</button>
        </form>
    </section>

</body>
</html>
