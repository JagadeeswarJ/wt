<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PageTurn Books</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
    <h1>PageTurn Books</h1>
    <a href="cart.html">View Cart (<span id="cart-count">0</span>)</a>

    <div id="books">
        <div class="book">
        <h3>1984</h3>
        <p>By George Orwell</p>
        <p>Price: Rs. 279</p>
        <button onclick="addToCart('1984', 279)">Add to Cart</button>
    </div>

    <div class="book">
        <h3>Thinking, Fast and Slow</h3>
        <p>By Daniel Kahneman</p>
        <p>Price: Rs. 449</p>
        <button onclick="addToCart('Thinking, Fast and Slow', 449)">Add to Cart</button>
    </div>

    <div class="book">
        <h3>The Psychology of Money</h3>
        <p>By Morgan Housel</p>
        <p>Price: Rs. 329</p>
        <button onclick="addToCart('The Psychology of Money', 329)">Add to Cart</button>
    </div>

    <div class="book">
        <h3>Zero to One</h3>
        <p>By Peter Thiel</p>
        <p>Price: Rs. 379</p>
        <button onclick="addToCart('Zero to One', 379)">Add to Cart</button>
    </div>
    </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
